version: '3.8'

# ============================================================
# Redis Cluster - Carrinho de Compras & Gestão de Sessões
# Arquitetura: 3 Masters + 3 Replicas = 6 nós
# Disciplina: SGBD II | Trabalho Prático NoSQL
# ============================================================

networks:
  redis-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:

  # ── MASTERS ─────────────────────────────────────────────
  redis-master-1:
    image: redis:7.2-alpine
    container_name: redis-master-1
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.11
    volumes:
      - redis-master-1-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-master-2:
    image: redis:7.2-alpine
    container_name: redis-master-2
    command: redis-server --port 6380 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6380"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.12
    volumes:
      - redis-master-2-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-master-3:
    image: redis:7.2-alpine
    container_name: redis-master-3
    command: redis-server --port 6381 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6381"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.13
    volumes:
      - redis-master-3-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REPLICAS ─────────────────────────────────────────────
  redis-replica-1:
    image: redis:7.2-alpine
    container_name: redis-replica-1
    command: redis-server --port 6382 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6382"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.14
    volumes:
      - redis-replica-1-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-replica-2:
    image: redis:7.2-alpine
    container_name: redis-replica-2
    command: redis-server --port 6383 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6383:6383"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.15
    volumes:
      - redis-replica-2-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6383", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-replica-3:
    image: redis:7.2-alpine
    container_name: redis-replica-3
    command: redis-server --port 6384 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6384:6384"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.16
    volumes:
      - redis-replica-3-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6384", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CLUSTER INITIALIZER ──────────────────────────────────
  redis-cluster-init:
    image: redis:7.2-alpine
    container_name: redis-cluster-init
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.20
    depends_on:
      redis-master-1:
        condition: service_healthy
      redis-master-2:
        condition: service_healthy
      redis-master-3:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
      redis-replica-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '>>> Aguardando nos estarem prontos...' && sleep 3 && echo '>>> Inicializando Redis Cluster (3 masters + 3 replicas)...' && redis-cli --cluster create 172.20.0.11:6379 172.20.0.12:6380 172.20.0.13:6381 172.20.0.14:6382 172.20.0.15:6383 172.20.0.16:6384 --cluster-replicas 1 --cluster-yes && echo '>>> Cluster criado com sucesso!' && redis-cli -h 172.20.0.11 -p 6379 cluster info
    restart: "no"

  # ── REDIS INSIGHT (GUI) ──────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.30
    volumes:
      - redis-insight-data:/data
    depends_on:
      - redis-cluster-init
    restart: unless-stopped

# ── VOLUMES ───────────────────────────────────────────────
volumes:
  redis-master-1-data:
  redis-master-2-data:
  redis-master-3-data:
  redis-replica-1-data:
  redis-replica-2-data:
  redis-replica-3-data:
  redis-insight-data: